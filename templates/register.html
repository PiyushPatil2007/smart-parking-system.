{% extends "base.html" %}

{% block title %}Smart Parking - Register{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2 style="text-align: center;">Register</h2>
    <form action="" method="post">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit" class="btn" style="width: 100%; margin-top: 15px;">Register</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>
{% endblock %}
