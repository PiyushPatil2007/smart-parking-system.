{% extends "base.html" %}

{% block title %}Smart Parking - Login{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2 style="text-align: center;">Login</h2>
    <form action="" method="post">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit" class="btn" style="width: 100%; margin-top: 15px;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">Don't have an account? <a
            href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
